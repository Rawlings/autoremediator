name: Autoremediator
description: >
  Agentic CVE remediation for Node.js dependencies.
  Runs version-bump remediation for scanner output or a single CVE ID,
  with LLM patch-generation fallback when no safe version exists,
  and integrates with MCP/OpenAPI security automation workflows.
author: rawlings

branding:
  icon: shield
  color: green

inputs:
  scan-file:
    description: >
      Path to scanner output file (npm audit --json, pnpm audit --json,
      yarn audit --json, bun audit --json, or SARIF). Mutually exclusive with cve-id.
      Mutually exclusive with audit. Required if cve-id and audit are not set.
    required: false
  audit:
    description: >
      Run a package-manager-native audit command instead of reading scan-file.
      Mutually exclusive with scan-file and cve-id. Uses npm directly and
      enables Corepack shims for pnpm and yarn audit mode.
    required: false
    default: 'false'
  cve-id:
    description: >
      Single CVE ID to remediate directly (e.g. CVE-2021-23337).
      Mutually exclusive with scan-file and audit. Required if scan-file and
      audit are not set.
    required: false
  format:
    description: >
      Scanner input format. One of: auto, npm-audit, yarn-audit, sarif.
      Ignored when cve-id is set.
    required: false
    default: auto
  cwd:
    description: >
      Target project directory containing package.json and lockfile.
      Defaults to repository root.
    required: false
    default: .
  package-manager:
    description: >
      Package manager to use for installs: npm, pnpm, yarn, bun, or deno.
      Auto-detected from lockfile if not set.
    required: false
  dry-run:
    description: Plan changes only — do not mutate files or run installs.
    required: false
    default: 'false'
  run-tests:
    description: >
      Run the package-manager test command to validate changes after applying.
    required: false
    default: 'false'
  ci:
    description: >
      Enable CI mode — exit non-zero when any CVE is unresolved after
      remediation attempts. Ignored when cve-id is set.
    required: false
    default: 'false'
  summary-file:
    description: >
      Write a machine-readable scan summary JSON to this path.
      Useful for downstream steps and artifact upload.
      Ignored when cve-id is set.
    required: false
  policy:
    description: >
      Path to a policy file (.github/autoremediator.yml) that controls upgrade
      constraints, allow/deny lists, and remediation behavior.
    required: false
  llm-provider:
    description: >
      LLM provider for patch-generation fallback when no safe version exists.
      One of: remote, local.
      local runs deterministic mode and does not require remote credentials.
    required: false
    default: local
  node-version:
    description: Node.js version to use. Must be 24 or higher.
    required: false
    default: '24'
  token:
    description: GitHub token for PR creation. Defaults to github.token.
    required: false
    default: ${{ github.token }}
  create-pull-request:
    description: Open a pull request with remediated changes.
    required: false
    default: 'false'
  pull-request-branch:
    description: Branch name prefix for the fix branch.
    required: false
  pull-request-title:
    description: Title for the pull request.
    required: false
  pull-request-commit-message:
    description: Commit message for remediation commits.
    required: false
  update-outdated:
    description: >
      Run update-outdated mode: bump all outdated npm packages to their latest
      versions without requiring a CVE ID. Cannot be combined with cve-id or scan-file.
    required: false
    default: 'false'
  include-transitive:
    description: >
      Include indirect/transitive dependencies in the outdated check.
      Only applicable when update-outdated is true.
    required: false
    default: 'false'
  containment-mode:
    description: >
      Halt the pipeline when any result disposition is not auto-apply.
      Use with dry-run to enforce hold-for-approval gates.
    required: false
    default: 'false'
  simulation-mode:
    description: >
      Populate planned mutation metadata and rebuttal findings without applying
      any changes. Requires dry-run. Valid for cve-id and scan modes.
    required: false
    default: 'false'

outputs:
  summary-file:
    description: >
      Path to the generated summary JSON file (if summary-file input was set).
    value: ${{ inputs.summary-file }}
  pull-request-url:
    description: URL of the created pull request, if any.
    value: ${{ steps.scan.outputs.pull-request-url }}

runs:
  using: composite
  steps:
    - name: Validate action inputs
      shell: bash
      env:
        INPUT_SCAN_FILE: ${{ inputs.scan-file }}
        INPUT_AUDIT: ${{ inputs.audit }}
        INPUT_CVE_ID: ${{ inputs.cve-id }}
        INPUT_FORMAT: ${{ inputs.format }}
      run: |
        if [ -n "$INPUT_CVE_ID" ] && { [ -n "$INPUT_SCAN_FILE" ] || [ "$INPUT_AUDIT" = "true" ]; }; then
          echo "cve-id is mutually exclusive with scan-file and audit."
          exit 1
        fi

        if [ -n "$INPUT_SCAN_FILE" ] && [ "$INPUT_AUDIT" = "true" ]; then
          echo "scan-file is mutually exclusive with audit."
          exit 1
        fi

        if [ -z "$INPUT_CVE_ID" ] && [ -z "$INPUT_SCAN_FILE" ] && [ "$INPUT_AUDIT" != "true" ]; then
          echo "Set one of cve-id, scan-file, or audit."
          exit 1
        fi

        if [ "$INPUT_AUDIT" = "true" ] && [ "$INPUT_FORMAT" = "sarif" ]; then
          echo "audit mode does not support sarif format."
          exit 1
        fi

    - name: Set up Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: ${{ inputs.node-version }}

    - name: Enable Corepack shims for audit mode
      if: ${{ inputs.audit == 'true' }}
      shell: bash
      run: corepack enable

    - name: Install autoremediator
      shell: bash
      run: npm install -g autoremediator@latest

    - name: Remediate single CVE
      if: ${{ inputs.cve-id != '' }}
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
        INPUT_CVE_ID: ${{ inputs.cve-id }}
        INPUT_CWD: ${{ inputs.cwd }}
        INPUT_PKG_MANAGER: ${{ inputs.package-manager }}
        INPUT_DRY_RUN: ${{ inputs.dry-run }}
        INPUT_RUN_TESTS: ${{ inputs.run-tests }}
        INPUT_POLICY: ${{ inputs.policy }}
        INPUT_LLM_PROVIDER: ${{ inputs.llm-provider }}
        INPUT_CONTAINMENT_MODE: ${{ inputs.containment-mode }}
        INPUT_SIMULATION_MODE: ${{ inputs.simulation-mode }}
      run: |
        ARGS=("cve" "$INPUT_CVE_ID" "--cwd" "$INPUT_CWD")
        [ -n "$INPUT_PKG_MANAGER" ]           && ARGS+=("--package-manager" "$INPUT_PKG_MANAGER")
        [ "$INPUT_DRY_RUN"         = "true" ] && ARGS+=("--dry-run")
        [ "$INPUT_RUN_TESTS"       = "true" ] && ARGS+=("--run-tests")
        [ -n "$INPUT_POLICY" ]                && ARGS+=("--policy" "$INPUT_POLICY")
        [ -n "$INPUT_LLM_PROVIDER" ]          && ARGS+=("--llm-provider" "$INPUT_LLM_PROVIDER")
        [ "$INPUT_CONTAINMENT_MODE" = "true" ] && ARGS+=("--containment-mode")
        [ "$INPUT_SIMULATION_MODE"  = "true" ] && ARGS+=("--simulation-mode")
        autoremediator "${ARGS[@]}"

    - name: Remediate from scan input or audit mode
      id: scan
      if: ${{ inputs.scan-file != '' || inputs.audit == 'true' }}
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
        INPUT_SCAN_FILE: ${{ inputs.scan-file }}
        INPUT_AUDIT: ${{ inputs.audit }}
        INPUT_FORMAT: ${{ inputs.format }}
        INPUT_CWD: ${{ inputs.cwd }}
        INPUT_PKG_MANAGER: ${{ inputs.package-manager }}
        INPUT_DRY_RUN: ${{ inputs.dry-run }}
        INPUT_RUN_TESTS: ${{ inputs.run-tests }}
        INPUT_CI: ${{ inputs.ci }}
        INPUT_SUMMARY_FILE: ${{ inputs.summary-file }}
        INPUT_POLICY: ${{ inputs.policy }}
        INPUT_LLM_PROVIDER: ${{ inputs.llm-provider }}
        INPUT_CREATE_PR: ${{ inputs.create-pull-request }}
        INPUT_PR_BRANCH: ${{ inputs.pull-request-branch }}
        INPUT_PR_TITLE: ${{ inputs.pull-request-title }}
        INPUT_PR_COMMIT_MSG: ${{ inputs.pull-request-commit-message }}
        INPUT_CONTAINMENT_MODE: ${{ inputs.containment-mode }}
        INPUT_SIMULATION_MODE: ${{ inputs.simulation-mode }}
      run: |
        ARGS=("scan" "--format" "$INPUT_FORMAT" "--cwd" "$INPUT_CWD")
        [ -n "$INPUT_SCAN_FILE" ]              && ARGS+=("--input" "$INPUT_SCAN_FILE")
        [ "$INPUT_AUDIT"           = "true" ]  && ARGS+=("--audit")
        [ -n "$INPUT_PKG_MANAGER" ]            && ARGS+=("--package-manager" "$INPUT_PKG_MANAGER")
        [ "$INPUT_DRY_RUN"         = "true" ]  && ARGS+=("--dry-run")
        [ "$INPUT_RUN_TESTS"       = "true" ]  && ARGS+=("--run-tests")
        [ "$INPUT_CI"              = "true" ]  && ARGS+=("--ci")
        [ -n "$INPUT_SUMMARY_FILE" ]           && ARGS+=("--summary-file" "$INPUT_SUMMARY_FILE")
        [ -n "$INPUT_POLICY" ]                 && ARGS+=("--policy" "$INPUT_POLICY")
        [ -n "$INPUT_LLM_PROVIDER" ]           && ARGS+=("--llm-provider" "$INPUT_LLM_PROVIDER")
        [ "$INPUT_CONTAINMENT_MODE" = "true" ] && ARGS+=("--containment-mode")
        [ "$INPUT_SIMULATION_MODE"  = "true" ] && ARGS+=("--simulation-mode")
        if [ "$INPUT_CREATE_PR" = "true" ] && [ "$INPUT_DRY_RUN" != "true" ]; then
          ARGS+=("--create-change-request" "--change-request-provider" "github")
        fi
        autoremediator "${ARGS[@]}"
        PR_URL=""
        if [ "$INPUT_CREATE_PR" = "true" ] && [ "$INPUT_DRY_RUN" != "true" ]; then
          BRANCH="${INPUT_PR_BRANCH:-chore/autoremediator}"
          PR_URL="$(gh pr list --head "$BRANCH" --json url -q '.[0].url' 2>/dev/null || true)"
        fi
        echo "pull-request-url=${PR_URL}" >> "$GITHUB_OUTPUT"

    - name: Update outdated packages
      id: update-outdated
      if: ${{ inputs.update-outdated == 'true' }}
      shell: bash
      env:
        INPUT_CWD: ${{ inputs.cwd }}
        INPUT_PKG_MANAGER: ${{ inputs.package-manager }}
        INPUT_DRY_RUN: ${{ inputs.dry-run }}
        INPUT_RUN_TESTS: ${{ inputs.run-tests }}
        INPUT_POLICY: ${{ inputs.policy }}
        INPUT_INCLUDE_TRANSITIVE: ${{ inputs.include-transitive }}
      run: |
        ARGS=("update-outdated" "--cwd" "$INPUT_CWD")
        [ -n "$INPUT_PKG_MANAGER" ]              && ARGS+=("--package-manager" "$INPUT_PKG_MANAGER")
        [ "$INPUT_DRY_RUN"         = "true" ]    && ARGS+=("--dry-run")
        [ "$INPUT_RUN_TESTS"       = "true" ]    && ARGS+=("--run-tests")
        [ -n "$INPUT_POLICY" ]                   && ARGS+=("--policy" "$INPUT_POLICY")
        [ "$INPUT_INCLUDE_TRANSITIVE" = "true" ] && ARGS+=("--include-transitive")
        autoremediator "${ARGS[@]}"
