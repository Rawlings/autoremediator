name: Instructions Governance

on:
  pull_request:
    paths:
      - '.github/**'
      - 'packages/core/src/**'
      - 'packages/docs/**'
      - 'package.json'
      - 'pnpm-workspace.yaml'
      - 'pnpm-lock.yaml'
      - 'packages/**/pnpm-lock.yaml'
  push:
    branches:
      - main
    paths:
      - '.github/**'
      - 'packages/core/src/**'
      - 'packages/docs/**'
      - 'package.json'
      - 'pnpm-workspace.yaml'
      - 'pnpm-lock.yaml'
      - 'packages/**/pnpm-lock.yaml'

jobs:
  check-instructions:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate governance contracts
        run: pnpm build

      - name: Build docs package
        run: pnpm docs:build
