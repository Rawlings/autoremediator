name: Reusable Autoremediator Workflow

on:
  workflow_call:
    inputs:
      scan-file:
        description: Optional scanner output file path.
        required: false
        type: string
        default: ""
      audit:
        description: Run a package-manager-native audit instead of reading scan-file.
        required: false
        type: boolean
        default: true
      cve-id:
        description: Optional single CVE ID for direct remediation.
        required: false
        type: string
        default: ""
      format:
        description: Scanner input format when scan-file or audit mode is used.
        required: false
        type: string
        default: auto
      cwd:
        description: Target project directory.
        required: false
        type: string
        default: .
      package-manager:
        description: Optional package manager override.
        required: false
        type: string
        default: ""
      dry-run:
        description: Plan only without mutating files.
        required: false
        type: boolean
        default: false
      run-tests:
        description: Run package-manager test command after applying changes.
        required: false
        type: boolean
        default: false
      ci:
        description: Exit non-zero when unresolved CVEs remain.
        required: false
        type: boolean
        default: false
      summary-file:
        description: Optional summary output path. Defaults to the runner temp directory.
        required: false
        type: string
        default: ""
      policy:
        description: Optional .autoremediator.json policy path.
        required: false
        type: string
        default: ""
      llm-provider:
        description: Patch fallback provider.
        required: false
        type: string
        default: local
      node-version:
        description: Node.js version for the wrapper workflow.
        required: false
        type: string
        default: "24"
      create-pull-request:
        description: Create or update a pull request when remediation changes files.
        required: false
        type: boolean
        default: false
      pull-request-branch:
        description: Branch name for the remediation pull request.
        required: false
        type: string
        default: chore/autoremediator
      pull-request-title:
        description: Pull request title.
        required: false
        type: string
        default: "chore: automated CVE remediation"
      pull-request-commit-message:
        description: Commit message for remediation changes.
        required: false
        type: string
        default: "chore: automated CVE remediation"
      pull-request-body-header:
        description: Introductory text for the generated pull request body.
        required: false
        type: string
        default: "This pull request was generated by the reusable autoremediator workflow."
      upload-summary-artifact:
        description: Upload the generated summary JSON as a workflow artifact.
        required: false
        type: boolean
        default: false
      summary-artifact-name:
        description: Artifact name used when upload-summary-artifact is enabled.
        required: false
        type: string
        default: autoremediator-summary
    outputs:
      changed:
        description: Whether remediation changed tracked repository files.
        value: ${{ jobs.remediate.outputs.changed }}
      summary-file:
        description: Resolved summary file path.
        value: ${{ jobs.remediate.outputs.summary-file }}
      pull-request-number:
        description: Pull request number when create-pull-request is enabled.
        value: ${{ jobs.remediate.outputs.pull-request-number }}
      pull-request-url:
        description: Pull request URL when create-pull-request is enabled.
        value: ${{ jobs.remediate.outputs.pull-request-url }}

jobs:
  remediate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      changed: ${{ steps.changes.outputs.changed }}
      summary-file: ${{ steps.paths.outputs.summary_file }}
      pull-request-number: ${{ steps.create-pr.outputs.pull-request-number }}
      pull-request-url: ${{ steps.create-pr.outputs.pull-request-url }}
    steps:
      - name: Check out caller repository
        uses: actions/checkout@v4

      - name: Resolve reusable workflow source
        id: workflow-source
        shell: bash
        run: |
          WORKFLOW_REF="${GITHUB_WORKFLOW_REF}"
          echo "repository=${WORKFLOW_REF%%/.github/workflows/*}" >> "$GITHUB_OUTPUT"
          echo "ref=${WORKFLOW_REF#*@}" >> "$GITHUB_OUTPUT"

      - name: Check out autoremediator action source
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.workflow-source.outputs.repository }}
          ref: ${{ steps.workflow-source.outputs.ref }}
          path: .autoremediator-action

      - name: Resolve workflow paths
        id: paths
        shell: bash
        env:
          INPUT_SUMMARY_FILE: ${{ inputs.summary-file }}
          RUNNER_TEMP_DIR: ${{ runner.temp }}
        run: |
          if [ -n "$INPUT_SUMMARY_FILE" ]; then
            SUMMARY_FILE="$INPUT_SUMMARY_FILE"
          else
            SUMMARY_FILE="$RUNNER_TEMP_DIR/autoremediator-summary.json"
          fi

          echo "summary_file=$SUMMARY_FILE" >> "$GITHUB_OUTPUT"

      - name: Run autoremediator
        uses: ./.autoremediator-action
        with:
          scan-file: ${{ inputs.scan-file }}
          audit: ${{ inputs.audit && 'true' || 'false' }}
          cve-id: ${{ inputs.cve-id }}
          format: ${{ inputs.format }}
          cwd: ${{ inputs.cwd }}
          package-manager: ${{ inputs.package-manager }}
          dry-run: ${{ inputs.dry-run && 'true' || 'false' }}
          run-tests: ${{ inputs.run-tests && 'true' || 'false' }}
          ci: ${{ inputs.ci && 'true' || 'false' }}
          summary-file: ${{ steps.paths.outputs.summary_file }}
          policy: ${{ inputs.policy }}
          llm-provider: ${{ inputs.llm-provider }}
          node-version: ${{ inputs.node-version }}

      - name: Remove checked out action source
        if: ${{ always() }}
        shell: bash
        run: rm -rf .autoremediator-action

      - name: Detect repository changes
        id: changes
        if: ${{ always() }}
        shell: bash
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Detect summary output
        id: summary-output
        if: ${{ always() }}
        shell: bash
        env:
          SUMMARY_FILE: ${{ steps.paths.outputs.summary_file }}
        run: |
          if [ -f "$SUMMARY_FILE" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build pull request body
        if: ${{ success() && inputs.create-pull-request && !inputs.dry-run && steps.changes.outputs.changed == 'true' }}
        shell: bash
        env:
          SUMMARY_FILE: ${{ steps.paths.outputs.summary_file }}
          PR_BODY_HEADER: ${{ inputs.pull-request-body-header }}
        run: |
          node <<'EOF'
          const fs = require("node:fs");

          const summaryPath = process.env.SUMMARY_FILE;
          const header = process.env.PR_BODY_HEADER || "This pull request was generated by autoremediator.";
          const lines = [header, ""];

          if (summaryPath && fs.existsSync(summaryPath)) {
            const summary = JSON.parse(fs.readFileSync(summaryPath, "utf8"));
            const scalarKeys = [
              ["status", "Status"],
              ["cveCount", "CVEs evaluated"],
              ["remediationCount", "Remediation attempts"],
              ["successCount", "Successful remediations"],
              ["failedCount", "Failed remediations"],
              ["patchCount", "Patch artifacts"],
            ];

            lines.push("## Summary", "");
            for (const [key, label] of scalarKeys) {
              if (summary[key] !== undefined) {
                lines.push(`- ${label}: ${summary[key]}`);
              }
            }

            const unresolved = summary.unresolvedByReason;
            if (unresolved && typeof unresolved === "object" && Object.keys(unresolved).length > 0) {
              lines.push("", "## Unresolved By Reason", "");
              for (const [reason, count] of Object.entries(unresolved)) {
                lines.push(`- ${reason}: ${count}`);
              }
            }
          } else {
            lines.push("No scan summary was produced for this run.");
          }

          lines.push("", "Generated by the reusable autoremediator workflow.");
          fs.writeFileSync(".autoremediator-pr-body.md", `${lines.join("\n")}\n`);
          EOF

      - name: Create remediation pull request
        id: create-pr
        if: ${{ success() && inputs.create-pull-request && !inputs.dry-run && steps.changes.outputs.changed == 'true' }}
        uses: peter-evans/create-pull-request@v6
        with:
          branch: ${{ inputs.pull-request-branch }}
          commit-message: ${{ inputs.pull-request-commit-message }}
          title: ${{ inputs.pull-request-title }}
          body-path: .autoremediator-pr-body.md

      - name: Upload summary artifact
        if: ${{ always() && inputs.upload-summary-artifact && steps.summary-output.outputs.exists == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.summary-artifact-name }}
          path: ${{ steps.paths.outputs.summary_file }}
