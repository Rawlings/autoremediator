name: Publish GitHub Action release

on:
  push:
    branches:
      - main
      - master
    paths:
      - action.yml
      - .github/workflows/reusable-remediate-from-audit.yml
      - .github/workflow-templates/**
      - packages/core/package.json
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve tags from package version
        id: vars
        run: |
          VERSION=$(jq -r .version packages/core/package.json)
          if [ -z "$VERSION" ] || [ "$VERSION" = "null" ]; then
            echo "Unable to read version from packages/core/package.json"
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "semver_tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "major_tag=v${VERSION%%.*}" >> "$GITHUB_OUTPUT"

      - name: Create semver tag and refresh floating major tag
        run: |
          SEMVER_TAG="${{ steps.vars.outputs.semver_tag }}"
          MAJOR_TAG="${{ steps.vars.outputs.major_tag }}"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git ls-remote --exit-code --tags origin "refs/tags/$SEMVER_TAG" >/dev/null; then
            echo "Semver tag $SEMVER_TAG already exists on origin"
            git fetch --no-tags origin "refs/tags/$SEMVER_TAG:refs/tags/$SEMVER_TAG" || true
          elif git rev-parse -q --verify "refs/tags/$SEMVER_TAG" >/dev/null; then
            echo "Semver tag $SEMVER_TAG already exists locally"
          else
            git tag -a "$SEMVER_TAG" -m "Release $SEMVER_TAG"
            git push origin "$SEMVER_TAG"
          fi

          git tag -fa "$MAJOR_TAG" -m "Track latest $MAJOR_TAG release" "$SEMVER_TAG"
          git push origin "$MAJOR_TAG" --force

      - name: Create or update semver release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.semver_tag }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
