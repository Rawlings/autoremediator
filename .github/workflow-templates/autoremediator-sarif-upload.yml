name: autoremediator-sarif

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 3 * * *"

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
      - name: Enable Corepack shims
        run: corepack enable
      - name: Install autoremediator
        run: npm install -g autoremediator@0.14.1 # pin to a specific version; update periodically
      - name: Run autoremediator in SARIF mode
        run: autoremediator scan --audit --dry-run --output-format sarif > results.sarif
      - uses: github/codeql-action/upload-sarif@ce64ddcb0d8d890d2df4a9d1c04ff297367dea2a # v3.35.2
        with:
          sarif_file: results.sarif
